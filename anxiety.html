<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Steady Check — An Anxiety Self-Reflection Screener</title>
<meta name="description" content="A free 12-question self-reflection screener for anxiety-related worry and physical tension patterns. Not a diagnosis — a conversation starter." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F6F8FB;
    --ink: #1F2A3A;
    --primary: #33587E;
    --accent: #E27D60;
    --muted: #8496AC;
    --line: #DCE4EE;
    --tint: #EAF0F7;
    --low: #4C956C;
    --mid: #E8A93B;
    --high: #C0533F;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; display: flex; justify-content: center; padding: 32px 16px 60px; }
  .wrap { width: 100%; max-width: 440px; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .brand-title { font-family: 'Fraunces', serif; font-weight: 700; font-size: 20px; line-height: 1; }
  .brand-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.03em; margin-top: 3px; }
  h1 { font-family: 'Fraunces', serif; font-size: 32px; line-height: 1.15; font-weight: 600; margin: 0 0 14px; }
  h2 { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; line-height: 1.35; margin: 0 0 26px; min-height: 96px; }
  p.lead { font-size: 15px; line-height: 1.6; color: #445A72; margin: 0 0 20px; }
  .notice { background: var(--tint); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; font-size: 13px; line-height: 1.55; color: var(--primary); margin-bottom: 24px; }
  .btn-primary { width: 100%; background: var(--primary); color: var(--paper); border: none; border-radius: 12px; padding: 16px 20px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
  .btn-primary:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
  .btn-ghost { width: 100%; background: none; border: 1.5px solid var(--line); border-radius: 12px; padding: 15px 20px; font-size: 15px; font-weight: 600; color: var(--primary); cursor: pointer; font-family: 'Inter', sans-serif; margin-top: 10px; }
  .progress-row { display: flex; gap: 5px; margin-bottom: 22px; }
  .progress-seg { flex: 1; height: 4px; border-radius: 2px; background: var(--line); }
  .progress-seg.active { background: var(--accent); }
  .qcount { font-size: 12px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-bottom: 10px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn { text-align: left; padding: 14px 16px; border-radius: 10px; border: 1.5px solid var(--line); background: #fff; cursor: pointer; font-size: 15px; font-weight: 500; color: var(--ink); font-family: 'Inter', sans-serif; transition: all 0.15s ease; }
  .opt-btn:hover { border-color: var(--primary); background: var(--tint); }
  .opt-btn.selected { border-color: var(--primary); background: var(--tint); }
  .opt-btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
  .back-link { margin-top: 20px; background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 0; }
  .result-label-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  .result-label { font-family: 'Fraunces', serif; font-size: 40px; font-weight: 700; }
  .result-score { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  .bar-track { height: 8px; background: var(--line); border-radius: 4px; overflow: hidden; margin-bottom: 22px; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .section-label { font-size: 12px; color: var(--muted); letter-spacing: 0.03em; margin-bottom: 10px; }
  .domain-row { margin-bottom: 10px; }
  .domain-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .domain-val { color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .domain-track { height: 5px; background: var(--line); border-radius: 3px; overflow: hidden; }
  .domain-fill { height: 100%; background: var(--primary); border-radius: 3px; }
  @media (prefers-reduced-motion: reduce) { .opt-btn, .bar-fill { transition: none; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <svg id="lens" width="72" height="72" viewBox="0 0 72 72" style="overflow:visible"></svg>
    <div>
      <div class="brand-title">Steady Check</div>
      <div class="brand-sub">AN ANXIETY SELF-REFLECTION SCREENER</div>
    </div>
  </div>
  <div id="app"></div>
</div>

<script>
const QUESTIONS = [
  { id: 1, domain: "worry", text: "Your mind jumps to worst-case scenarios before you've even confirmed something is actually a problem." },
  { id: 2, domain: "worry", text: "You find it hard to stop worrying once you start, even about things you know are small." },
  { id: 3, domain: "physical", text: "Your heart races, your chest feels tight, or your stomach knots up in situations that aren't physically dangerous." },
  { id: 4, domain: "restlessness", text: "You feel keyed up or on edge, like you can't quite relax even when nothing specific is wrong." },
  { id: 5, domain: "sleep", text: "Worry keeps you lying awake, or you wake up with your mind already racing." },
  { id: 6, domain: "concentration", text: "Worry crowds out your ability to focus on the task in front of you." },
  { id: 7, domain: "irritability", text: "You've snapped at someone or felt unusually short-tempered when you were actually anxious underneath it." },
  { id: 8, domain: "physical", text: "You get tense muscles, headaches, or fatigue that seem tied to stress rather than physical exertion." },
  { id: 9, domain: "avoidance", text: "You've put off or avoided a call, event, or task specifically because thinking about it made you anxious." },
  { id: 10, domain: "worry", text: "You replay a conversation or decision afterward, worrying you said or did the wrong thing." },
  { id: 11, domain: "control", text: "Even when you know a worry is probably irrational, you still can't fully talk yourself out of it." },
  { id: 12, domain: "restlessness", text: "Small uncertainties — an unanswered message, a delayed reply — sit with you longer than they probably should." },
];

const OPTIONS = [
  { value: 0, label: "Never" },
  { value: 1, label: "Rarely" },
  { value: 2, label: "Often" },
  { value: 3, label: "Very often" },
];

const DOMAIN_LABELS = {
  worry: "Worry patterns",
  physical: "Physical tension",
  restlessness: "Restlessness",
  sleep: "Sleep interference",
  concentration: "Concentration",
  irritability: "Irritability",
  avoidance: "Avoidance",
  control: "Difficulty letting go",
};

const MAX_SCORE = QUESTIONS.length * 3;
let answers = {}, current = 0, screen = "intro";

function scoreBand(total) {
  const pct = total / MAX_SCORE;
  if (pct < 0.3) return { label: "Low signal", color: "var(--low)", blurb: "Your answers don't show much pattern of the worry or physical-tension traits this check looks at." };
  if (pct < 0.6) return { label: "Some signal", color: "var(--mid)", blurb: "You're noticing some worry and tension some of the time. That's common and doesn't mean an anxiety disorder on its own — but if it's wearing you down, it's worth paying attention to." };
  return { label: "Strong signal", color: "var(--high)", blurb: "A lot of these patterns are showing up often for you. That doesn't mean a diagnosis — only a qualified clinician can give you one — but it may be worth a proper conversation with a doctor or psychologist." };
}

function renderLens(progress) {
  const svg = document.getElementById("lens");
  const dots = 12;
  let inner = `<circle cx="36" cy="36" r="3" fill="#E27D60" opacity="${progress}"></circle>`;
  for (let i = 0; i < dots; i++) {
    const angle = (i / dots) * Math.PI * 2;
    const scatterR = 30, focusR = 4 + (i % 3);
    const r = scatterR - (scatterR - focusR) * progress;
    const x = 36 + Math.cos(angle) * r, y = 36 + Math.sin(angle) * r;
    inner += `<circle cx="${x}" cy="${y}" r="1.6" fill="#33587E" opacity="${0.35 + 0.65 * progress}"></circle>`;
  }
  svg.innerHTML = inner;
}

function selectAnswer(qid, value) {
  answers[qid] = value;
  render();
  setTimeout(() => {
    if (current < QUESTIONS.length - 1) current += 1; else screen = "result";
    render();
  }, 180);
}

function restart() { answers = {}; current = 0; screen = "intro"; render(); }

function copyResult(total, band) {
  const text = `I took the Steady Check (12-question anxiety self-reflection screener).\nResult: ${band.label} (${total}/${MAX_SCORE})\n\nThis isn't a diagnosis — just a starting point for a conversation. Try it yourself.`;
  navigator.clipboard?.writeText(text).then(() => {
    const btn = document.getElementById("copyBtn");
    if (btn) { const o = btn.textContent; btn.textContent = "Copied ✓"; setTimeout(() => (btn.textContent = o), 2000); }
  });
}

function render() {
  const app = document.getElementById("app");
  const progress = Object.keys(answers).length / QUESTIONS.length;
  renderLens(screen === "intro" ? 0 : screen === "result" ? 1 : progress);

  if (screen === "intro") {
    app.innerHTML = `
      <h1>Twelve questions.<br>Ninety seconds. No login.</h1>
      <p class="lead">This is a light, shareable version of the worry, tension, and restlessness patterns that show up in anxiety screening conversations. Answer honestly about the last two weeks — there's no "good" answer, just a signal to notice.</p>
      <div class="notice">This isn't a diagnostic tool and no score here means you have or don't have an anxiety disorder. Only a doctor or psychologist can diagnose that. Think of this as a conversation starter, for yourself or with a clinician.</div>
      <button class="btn-primary" id="startBtn">Start the check →</button>
    `;
    document.getElementById("startBtn").onclick = () => { screen = "quiz"; render(); };
    return;
  }

  if (screen === "quiz") {
    const q = QUESTIONS[current];
    let segs = "";
    for (let i = 0; i < QUESTIONS.length; i++) segs += `<div class="progress-seg ${i <= current ? "active" : ""}"></div>`;
    let opts = "";
    OPTIONS.forEach(opt => {
      const selected = answers[q.id] === opt.value;
      opts += `<button class="opt-btn ${selected ? "selected" : ""}" data-val="${opt.value}">${opt.label}</button>`;
    });
    app.innerHTML = `
      <div class="progress-row">${segs}</div>
      <div class="qcount">QUESTION ${current + 1} / ${QUESTIONS.length}</div>
      <h2>${q.text}</h2>
      <div class="options">${opts}</div>
      ${current > 0 ? `<button class="back-link" id="backBtn">← back</button>` : ""}
    `;
    app.querySelectorAll(".opt-btn").forEach(btn => { btn.onclick = () => selectAnswer(q.id, parseInt(btn.dataset.val, 10)); });
    if (current > 0) document.getElementById("backBtn").onclick = () => { current -= 1; render(); };
    return;
  }

  if (screen === "result") {
    const total = Object.values(answers).reduce((a, b) => a + b, 0);
    const band = scoreBand(total);
    const domainTotals = {};
    QUESTIONS.forEach(q => { domainTotals[q.domain] = (domainTotals[q.domain] || 0) + (answers[q.id] ?? 0); });
    let domainRows = "";
    Object.entries(domainTotals).forEach(([domain, val]) => {
      const domainMax = QUESTIONS.filter(q => q.domain === domain).length * 3;
      domainRows += `
        <div class="domain-row">
          <div class="domain-top"><span>${DOMAIN_LABELS[domain]}</span><span class="domain-val">${val}/${domainMax}</span></div>
          <div class="domain-track"><div class="domain-fill" style="width:${(val / domainMax) * 100}%"></div></div>
        </div>`;
    });
    app.innerHTML = `
      <div class="qcount">YOUR RESULT</div>
      <div class="result-label-row"><span class="result-label" style="color:${band.color}">${band.label}</span></div>
      <div class="result-score">${total} / ${MAX_SCORE} points</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(total / MAX_SCORE) * 100}%; background:${band.color}"></div></div>
      <p class="lead">${band.blurb}</p>
      <div class="section-label">BREAKDOWN BY AREA</div>
      ${domainRows}
      <div class="notice" style="margin-top:16px;">Remember: this is a screener you built to share, not a clinical instrument. If worry or tension is getting in the way of sleep, work, or daily life, a real conversation with a doctor or psychologist is the next useful step. If you're in crisis or feeling unsafe, please reach out to a local crisis line or emergency service right away.</div>
      <button class="btn-primary" id="copyBtn">Copy result to share</button>
      <button class="btn-ghost" id="restartBtn">Retake</button>
    `;
    document.getElementById("copyBtn").onclick = () => copyResult(total, band);
    document.getElementById("restartBtn").onclick = restart;
    return;
  }
}

render();
</script>
</body>
</html>
